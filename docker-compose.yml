services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: secura_ai
      POSTGRES_USER: secura
      POSTGRES_PASSWORD: secura_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - secura_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://secura:secura_password_change_me@postgres:5432/secura_ai
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE: secura
      CORS_ALLOW_ORIGINS: "*"
      AUTO_CREATE_SCHEMA: "false"
      BOOTSTRAP_TOKEN: "change-me"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://secura:secura_password_change_me@postgres:5432/secura_ai
    command: ["alembic", "-c", "backend/alembic.ini", "upgrade", "head"]
    depends_on:
      - postgres

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://secura:secura_password_change_me@postgres:5432/secura_ai
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE: secura
    command: ["python", "-m", "backend.app.worker"]
    depends_on:
      - postgres
      - redis

volumes:
  secura_pg:

